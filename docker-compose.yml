version: "3.8"

# =============================================================
# Warp9Net IPAM — Self-Hosted Stack for Portainer
# 3 containers: MySQL + API + Frontend
# Frontend on port 4242, API proxied via Nginx
# =============================================================

services:

  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-ipam}
      MYSQL_USER: ${DB_USER:-ipam}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ipam_password}
    volumes:
      - db-data:/var/lib/mysql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Node.js API ─────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-ipam}
      DB_PASSWORD: ${DB_PASSWORD:-ipam_password}
      DB_NAME: ${DB_NAME:-ipam}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3001
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Nginx serving built React app) ────────────────
  ipam-frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "4242:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db-data:
  uploads-data:
