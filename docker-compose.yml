version: "3.8"

# =============================================================
# Warp9Net IPAM — Self-Hosted Stack for Portainer
# 3 containers: MySQL + API + Frontend
# Frontend on port 4242, API on port 3001 (internal)
# Proxy via Nginx Proxy Manager → ipam.warp9studios.com:443
# =============================================================

services:

  # ── MySQL Database ──────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ipam
      MYSQL_USER: ipam
      MYSQL_PASSWORD: ${DB_PASSWORD:-ipam_password}
    volumes:
      - db-data:/var/lib/mysql
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API ─────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ipam
      DB_PASSWORD: ${DB_PASSWORD:-ipam_password}
      DB_NAME: ipam
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3001
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Nginx serving built React app) ────────────────
  ipam-frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    restart: unless-stopped
    ports:
      - "4242:80"
    depends_on:
      - api

volumes:
  db-data:
  uploads-data:
